name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  # JOB 1: Test the code
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test

  # JOB 2: Build and Push to Docker Hub (only if tests pass)
  build-and-push:
    needs: test # This ensures the build only starts if tests pass!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'your-username' with your actual Docker Hub username
          # 'my-node-app' is what the image will be named on Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app:latest
